                            size: 15 + Math.floor(newBotScore / 2)
                        });

                        myPlayerRef.remove();
                    }
                }
            }

            // Столкновения игроков друг с другом
            for (let otherId in players) {
                if (otherId !== myId) {
                    let other = players[otherId];
                    let distToPlayer = Math.hypot(myPlayer.x - other.x, myPlayer.y - other.y);

                    if (distToPlayer < myPlayer.size && myPlayer.size > other.size * 1.15) {
                        let newScore = myPlayer.score + Math.floor(other.score / 2) + 5;
                        myPlayerRef.update({ score: newScore, size: 15 + Math.floor(newScore / 2) });

                        // Удаляем съеденного игрока из БД
                        database.ref('players/' + otherId).remove();
                    }
                }
            }

            if (amIHost()) {
                updateBotsAI();
            }

        }, 1000 / 60);

        // Обновление таблицы лидеров
        function updateLeaderboard() {
            const leaderList = document.getElementById('leader-list');
            if (!leaderList) return;

            let list = [
                ...Object.values(players),
                ...Object.values(bots).map(b => ({ ...b, name: "[Бот] " + b.name }))
            ];

            let sorted = list.sort((a,b) => b.score - a.score).slice(0, 5);
            let listHTML = "";
            sorted.forEach((p, index) => {
                listHTML += `<div class="leader-row"><span>${index+1}. ${p.name}</span><b>${p.score}</b></div>`;
            });
            leaderList.innerHTML = listHTML;
